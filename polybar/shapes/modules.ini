;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/memory]
type = internal/memory
interval = 1
format = <label>
format-prefix = " "
format-prefix-foreground = ${color.shade1}
format-prefix-background = ${color.shade2}
format-prefix-padding = 0
format-background = ${color.shade2}
format-padding = 0
label = "%gb_used%"
label-background = ${color.shade2}
label-foreground = ${color.shade1}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/wired]
type = internal/network
interface = enp4s0
interval = 1.0
format-connected = <label-connected>
format-connected-background = ${color.shade2}
format-connected-padding = 1
label-connected = "  %downspeed%   %upspeed% "
label-connected-foreground = ${color.shade1}
format-disconnected = <label-disconnected>
format-disconnected-prefix = " "
format-disconnected-prefix-background = ${color.shade1}
format-disconnected-foreground = ${color.shade2}
label-disconnected = " Offline"
label-disconnected-foreground = ${color.shade1}

; If you use both a wired and a wireless network, just add 2 module definitions. For example
[module/wired-network]
type = internal/network
interface = enp4s0

; Normal Module
[module/network]
type = internal/network
interface = wlan0

interval = 1.0
accumulate-stats = true
unknown-as-up = true
format-connected = <ramp-signal> <label-connected>
format-connected-background = ${color.shade3}
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = ﲁ
format-disconnected-background = ${color.shade3}
format-disconnected-padding = 1
label-connected = "%{A1:networkmanager_dmenu &:}%essid% %{A}"
label-disconnected = "%{A1:networkmanager_dmenu &:} Offline %{A}"
ramp-signal-0 = 說
ramp-signal-1 = 說
ramp-signal-2 = 說
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_03_00.6.analog-stereo
use-ui-max = false
interval = 5
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.shade3}
format-volume-padding = 1
format-muted = <label-muted>
format-muted-prefix = 婢
format-muted-background = ${color.shade3}
format-muted-foreground = ${color.shade2}
format-muted-padding = 1
label-volume = "%percentage%% "
label-volume-foreground = ${color.shade2}
label-foreground = ${color.shade2}
label-muted = " Muted "
label-muted-foreground = ${color.shade2}
ramp-volume-0 = 奄
ramp-volume-1 = 奔
ramp-volume-2 = 墳
ramp-volume-0-foreground = ${color.shade2}
ramp-volume-1-foreground = ${color.shade2}
ramp-volume-2-foreground = ${color.shade2}
click-right = pavucontrol&

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/temperature]
type = internal/temperature
interval = 0.5
thermal-zone = 0
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon4/temp1_input 
warn-temperature = 65
units = true
format = <ramp> <label>
format-background = ${color.shade4}
format-padding = 0
format-warn = <ramp> <label-warn>
format-warn-background = ${color.shade4}
format-warn-foreground = ${color.background}
format-warn-padding = 0
label = "%temperature-c% "
label-foreground = ${color.shade1}
label-warn = "%temperature-c% "
ramp-0 = %{F#33C7DE}%{F-}
ramp-1 = %{F#33C7DE}%{F-}
ramp-2 = %{F#E2B93D}%{F-}
ramp-3 = %{F#E2B93D}%{F-}
ramp-4 = %{F#E2443D}%{F-}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/keyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout> <label-indicator>
format-prefix = 
format-prefix-foreground = ${color.shade2}
format-background = ${color.shade7}
format-padding = 1
layout-icon-default = US
layout-icon-0 = us;;US
layout-icon-1 = rs;;SR-C
layout-icon-2 = rs;latin;SR-L
layout-icon-3 = es;;ES
label-layout = " %icon%"
label-layout-foreground = ${color.shade2}
label-indicator-on = %name%
label-indicator-on-foreground = ${color.foreground}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow
format = <label>
format-background = ${color.shade2}
format-padding = 1
label = " %title%"
label-foreground = ${color.shade1}
label-maxlen = 30
label-empty = " Desktop"
label-empty-foreground = ${color.foreground}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = true
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-default = 
format = <label-state>
label-monitor = %name%
; label-active = 
label-active-foreground = ${color.shade1}
; label-occupied = 
label-occupied-foreground = ${color.shade1}
label-urgent = 
label-urgent-foreground = ${color.shade2}
; label-empty = 
label-empty-foreground = ${color.foreground}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

label-active = %{T4}%{T-}
label-empty  = %{T4}%{T-}
label-occupied = %{T4}%{T-}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
