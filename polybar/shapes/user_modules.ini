[module/updates]
type = custom/script
exec = ~/.config/polybar/shapes/scripts/updates.sh
tail = true
interval = 5
format = <label>
format-prefix = 
format-background = ${color.shade6}
format-padding = 1
label = "%output% "
click-left = exo-open --launch TerminalEmulator &
click-right = exo-open --launch TerminalEmulator &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/launcher]
type = custom/text
content = " "
content-background = ${color.shade1}
content-foreground = ${color.foreground}
content-padding = 1
click-left = ~/.config/polybar/shapes/scripts/launcher.sh &
click-right = ~/.config/polybar/shapes/scripts/color-switch.sh &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/sysmenu]
type = custom/text
content = "襤 "

content-background = ${color.shade1}
content-foreground = ${color.foreground}
content-padding = 1

click-left = ~/.config/polybar/shapes/scripts/powermenu.sh &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/color-switch]
type = custom/text
content = " "

content-background = ${color.shade7}
content-foreground = ${color.foreground}
content-padding = 1

click-left = ~/.config/polybar/shapes/scripts/color-switch.sh &
click-right = ~/.config/polybar/shapes/scripts/style-switch.sh &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/sep]
type = custom/text
content = " | "

content-background = ${color.shade1}
content-foreground = ${color.background}
content-padding = 0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/links]
type = custom/text
content-foreground = ${color.foreground-alt}
content-padding = 2

[module/vukilis]
inherit = module/links
content-background = ${color.shade1}
content-foreground = ${color.shade2}
content-padding = 0
content = %{T4} 爵 %{T-}
; content = "  "
click-left = exo-open https://vukilis.com/ &

[module/github]
inherit = module/links
content-background = ${color.shade1}
content-foreground = ${color.shade2}
; content-padding-left = 1
content-padding = 1
content = %{T4}%{T-}
click-left = exo-open https://www.github.com/vukilis &

[module/gmail]
inherit = module/links
content-background = ${color.shade1}
content-foreground = ${color.shade2}
content-padding = 0
content = %{T4}%{T-}
click-left = exo-open https://mail.zoho.eu/ &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/powermenu]
type = custom/menu
expand-right = true
menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = shutdown
menu-0-1-exec = menu-open-2
menu-1-0 = back
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = systemctl reboot
menu-2-0 = shutdown
menu-2-0-exec = systemctl poweroff
menu-2-1 = back
menu-2-1-exec = menu-open-0
format = <label-toggle> <menu>
format-background = ${color.shade1}
format-foreground = ${color.foreground}
format-padding = 1
label-open = "襤 "
label-close = ""
label-separator = " | "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/menu]
type = custom/menu
expand-right = true
menu-0-0 = Menu
menu-0-0-exec = ~/.config/polybar/shapes/scripts/launcher.sh &
menu-0-1 = Files
menu-0-1-exec = thunar &
menu-0-2 = Terminal
menu-0-2-exec = termite &
menu-0-3 = Browser
menu-0-3-exec = firefox &

format = <label-toggle> <menu>
format-background = ${color.shade1}
format-foreground = ${color.foreground}
format-padding = 1

label-open = " 﩯"
label-close = " "
label-separator = " | "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/temperature-lmsensors]
type = custom/script
exec = ~/.config/polybar/shapes/scripts/temp_logic.sh
interval = 1.0

format = <label>
format-background = ${color.shade2}
format-padding = 1

label = %output%

click-left = xterm -e htop