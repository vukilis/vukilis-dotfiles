# Enable Blur
blur: {
  method = "dual_kawase";
  strength = 7;
  background = true;
};

# Force transparency on specific types of windows
backend = "glx";
vsync = true;

# If the theme isn't transparent enough:
opacity-rule = [
  "90:class_g = 'st-256color'",
  "90:class_g = 'Thunar'",
  "100:class_g = 'kitty'",
  "90:class_g = 'Polybar'",
  "95:class_g = 'dwm'"
];

shadow = true;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.5;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; blur-background = true; } # This line forces blur on Polybar
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
